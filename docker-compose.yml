# Docker Compose for IoT Shop
# Uses external PostgreSQL database
# 
# Prerequisites:
#   - Create .env file from .env.example
#   - PostgreSQL must be running and accessible
#
# Usage:
#   docker-compose up -d    # Start services
#   docker-compose down     # Stop services
#
# Exposed Ports:
#   - Server API: 4080 (maps to container port 3000)
#   - Storefront: 4081 (maps to container port 3001)

version: "3.8"

services:
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: iot-shop-server
    restart: unless-stopped
    ports:
      - "4080:3000"
    env_file:
      - .env
    volumes:
      - server_uploads:/usr/src/app/static/assets
    networks:
      - iot-shop-network

  worker:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: iot-shop-worker
    restart: unless-stopped
    command: ["npm", "run", "start:worker"]
    env_file:
      - .env
    volumes:
      - server_uploads:/usr/src/app/static/assets
    networks:
      - iot-shop-network

  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
    container_name: iot-shop-storefront
    restart: unless-stopped
    ports:
      - "4081:3001"
    env_file:
      - .env
    # Override API URL to use internal Docker network
    environment:
      - VENDURE_SHOP_API_URL=http://server:3000/shop-api
    depends_on:
      - server
    networks:
      - iot-shop-network

volumes:
  server_uploads:
    driver: local

networks:
  iot-shop-network:
    driver: bridge
