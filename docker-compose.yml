# Docker Compose for IoT Shop Production Deployment
# Uses external PostgreSQL database (not in Docker)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f        # View logs
#   docker-compose down           # Stop services
#
# Prerequisites:
#   - PostgreSQL must be running on host (localhost:5432)
#   - Database and user must be created

version: "3.8"

services:
  # Vendure Server
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: iot-shop-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Database (connecting to host PostgreSQL)
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-vendure}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_SCHEMA: public

      # App Config
      APP_ENV: production
      PORT: 3000
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-in-production}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-admin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-password}

      # S3/R2 Storage (optional - comment out if not using)
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_FILE_URL: ${S3_FILE_URL:-}
    volumes:
      - server_uploads:/usr/src/app/static/assets
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - iot-shop-network

  # Vendure Worker
  worker:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: iot-shop-worker
    restart: unless-stopped
    command: ["npm", "run", "start:worker"]
    environment:
      # Database (connecting to host PostgreSQL)
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-vendure}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_SCHEMA: public

      # App Config
      APP_ENV: production
      COOKIE_SECRET: ${COOKIE_SECRET:-change-me-in-production}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-admin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-password}

      # S3/R2 Storage
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_FILE_URL: ${S3_FILE_URL:-}
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - server_uploads:/usr/src/app/static/assets
    networks:
      - iot-shop-network

  # Next.js Storefront
  storefront:
    build:
      context: ./apps/storefront
      dockerfile: Dockerfile
    container_name: iot-shop-storefront
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      VENDURE_SHOP_API_URL: ${VENDURE_SHOP_API_URL:-http://localhost:3000/shop-api}
      VENDURE_CHANNEL_TOKEN: ${VENDURE_CHANNEL_TOKEN:-__default_channel__}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3001}
      REVALIDATION_SECRET: ${REVALIDATION_SECRET:-}
      NEXT_PUBLIC_DEFAULT_CURRENCY: UGX
    depends_on:
      server:
        condition: service_healthy
    networks:
      - iot-shop-network

  # Nginx Reverse Proxy (optional - for production)
  nginx:
    image: nginx:alpine
    container_name: iot-shop-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
      - storefront
    networks:
      - iot-shop-network
    profiles:
      - with-nginx

volumes:
  server_uploads:
    driver: local

networks:
  iot-shop-network:
    driver: bridge
